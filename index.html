        main.initColorScheme("system", true)

<body class="bg-slate-50 dark:bg-slate-900">
<header id="header-menu" class="sticky top-0 z-10 flex h-16 bg-white py-3 shadow-sm transition-all dark:bg-gray-800"
        x-data="{ open : false }">
    <div class="mx-auto flex h-full w-full max-w-7xl justify-between px-4 lg:px-6">
        <div class="flex h-full items-center gap-6">
            <div class="mr-2 h-full">
                <a href="/" class="inline-flex h-full items-center">

                    <span id="site-title"
                          class="text-lg font-medium text-gray-900 dark:text-slate-100">我的技术站</span>
                </a>
            </div>
            <ul class="hidden items-center gap-8 sm:flex">
                <li class="relative cursor-pointer text-sm font-medium transition-all" x-data="dropdown"
                    @mouseenter="open()" @mouseleave="close()">
                    <a class="text-gray-600 hover:text-blue-600 dark:text-slate-50 dark:hover:text-gray-300"
                       href="/">首页</a>
                </li>
            </ul>
        </div>
        <div class="flex items-center">
            <ul x-data="colorSchemeSwitcher" class="flex items-center gap-4">
                <li class="sm:hidden" x-on:click="open = true">
                    <div class="i-tabler-menu-2 text-lg text-gray-600 hover:text-blue-600 dark:text-slate-100"></div>
                </li>
                <li x-data="dropdown" class="relative cursor-pointer transition-all" @mouseenter="open()"
                    @mouseleave="close()">
                    <div class="cursor-pointer text-lg text-gray-600 transition-all hover:text-blue-600 dark:text-slate-100 i-gg-dark-mode"
                         :class="colorScheme.icon"
                         @click="[main.setColorScheme(nextColorScheme.value,true), currentValue = nextColorScheme.value]"
                         :title="`当前主题：${colorScheme.label}，点击切换为：${nextColorScheme.label}`"
                         title="当前主题：跟随系统，点击切换为：暗色"></div>
                </li>
                <!-- https://github.com/halo-sigs/plugin-search-widget -->
                <li>
                    <a href="javascript:SearchWidget.open()" title="搜索"
                       class="text-gray-600 hover:text-blue-600 dark:text-slate-100">
                        <div class="i-tabler-search text-lg"></div>
                    </a>
                </li>
                <li x-data="dropdown" class="relative cursor-pointer transition-all" @mouseenter="open()"
                    @mouseleave="close()">
                    <div>
                        <div class="size-5 text-gray-600 hover:text-blue-600 dark:text-slate-100">
                            <img class="size-5 rounded-full" src="./assets/icons/default-avatar.svg" alt="曹飞">
                        </div>
                    </div>
                </li>
            </ul>
        </div>
    </div>
    <div>
        <div class="fixed inset-0 z-50 bg-gray-800/40 opacity-100 backdrop-blur-sm dark:bg-black/80" aria-hidden="true"
             x-show="open" x-transition:enter="ease-in-out duration-300" x-transition:enter-start="opacity-0"
             x-transition:enter-end="opacity-100" x-transition:leave="ease-in-out duration-300"
             x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0" style="display: none;"></div>
        <div class="fixed inset-x-4 top-8 z-50 origin-top scale-100 rounded-lg bg-white p-4 dark:bg-slate-900"
             tabindex="-1" x-show="open" x-transition:enter="ease-out duration-200"
             x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
             x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100" x-transition:leave="ease-in duration-100"
             x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
             x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95" @click.outside="open = false"
             style="display: none;">
            <div class="flex flex-row-reverse items-center justify-between">
                <button class="i-tabler-x p-1 text-xl text-gray-600 dark:text-slate-300" type="button" tabindex="0"
                        @click="open = false"></button>
                <h2 class="text-sm font-medium text-gray-600 dark:text-slate-300">菜单</h2>
            </div>
            <nav class="mt-6">
                <ul class="-my-2 divide-y divide-gray-100 text-sm text-gray-800 dark:divide-slate-800 dark:text-slate-100">
                    <li>
                        <a class="flex items-center justify-between gap-1 py-2" href="/">
                            <span>首页</span>
                        </a>

                    </li>
                </ul>
            </nav>
        </div>
    </div>
